# Build and publish deb packages
# ---------------------------------------------------------------

name: жһ„е»әеҸ‘еёғdebеҢ…

on:
  release:
    types: [ released ]
  push:
    branches: [ "gh-build" ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: true
        default: '0.3.0'  # зҹӯжҡӮж—¶й—ҙеҶ…дёҚеҸҜиҫҫеҲ°зҡ„жңҖж–°зүҲжң¬еҸ·

jobs:
  Build-deb:
    name: жһ„е»әdebеҢ…
    runs-on: ubuntu-latest

    steps:
    - name: жЈҖеҮәд»Јз Ғ
      uses: actions/checkout@v6
      with:
        ref: gh-build

    - name: иҺ·еҸ–зүҲжң¬еҸ·
      id: get_version
      run: |
        if [ "${{ github.event_name }}" = "release" ]; then
          version="${{ github.event.release.tag_name }}"
          # еҲ йҷӨеүҚзјҖ 'v' if present
          version=${version#v}

        elif [ "${{ github.event_name }}" = "push" ];then
          # д»Һжәҗд»Јз ҒдёӯжҸҗеҸ–зүҲжң¬еҸ·
          version=$(sed -E -n 's/^#define Chsrc_Version +"([0-9]+\.[0-9]+\.[0-9]+).*"/\1/p' ./src/framework/version.h)

        else
          version="${{ github.event.inputs.version }}"
        fi

        echo "version=$version" >> $GITHUB_OUTPUT
        echo "Version: $version"

    - name: йӘҢиҜҒзүҲжң¬еҸ·
      run: |
        version="${{ steps.get_version.outputs.version }}"

        if [[ ! $version =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Invalid version format: $version"
          exit 1
        fi

    - name: жӣҙж–° debian/changelog
      run: |
        version="${{ steps.get_version.outputs.version }}"

        cd ./pkg/deb

        (cat << EOF; cat ./debian/changelog) > new_changelog
        chsrc ($version-1) unstable; urgency=medium

          * Release version $version

         -- жӣҫеҘҘз„¶ <ccmywish@qq.com>  $(date -R)

        EOF

        mv -f new_changelog ./debian/changelog

    - name: е®үиЈ…жһ„е»әдҫқиө–
      run: |
        sudo apt-get update
        sudo apt-get install -y debhelper devscripts build-essential fakeroot

    - name: жһ„е»ә
      run: |
        make build-deb

    - name: з§»еҠЁжһ„е»әдә§зү©еҲ°./distе’Ң./dist-for-pre
      run: |
        version="${{ steps.get_version.outputs.version }}"

        # еҲӣе»әдёӨдёӘзӣ®еҪ•жқҘеӯҳж”ҫжһ„е»әдә§зү©пјҲдә§зү©еҶ…е®№дёҖж ·пјҢеҸӘжҳҜж–Үд»¶еҗҚдёҚдёҖж ·пјү
        mkdir dist dist-for-pre
        find ./pkg -name "chsrc_${version}*.deb" -exec mv {} dist/ \;
        cp -r dist/* dist-for-pre/

        # дёҠдј иҮі 'pre' release зҡ„ж–Үд»¶еҗҚйңҖиҰҒи®ҫзҪ®дёә 'latest', д»ҺиҖҢзЁіе®ҡдёӢиҪҪURL
        cd ./dist-for-pre
        for old_name in ./chsrc_${version}*.deb; do
          new_name="${old_name/${version}-1/latest-1}"
          mv "$old_name" "$new_name"
        done

    - name: йӘҢиҜҒз”ҹжҲҗзҡ„debеҢ…
      run: |
        version="${{ steps.get_version.outputs.version }}"
        ls -la dist/
        dpkg-deb --info dist/chsrc_${version}-1_amd64.deb
        dpkg-deb --contents dist/chsrc_${version}-1_amd64.deb

    - name: жөӢиҜ•debеҢ…иғҪеҗҰжӯЈеёёе®үиЈ…
      run: |
        version="${{ steps.get_version.outputs.version }}"

        sudo dpkg -i dist/chsrc_${version}-1_amd64.deb || true
        sudo apt-get install -f -y || true

        bash pkg/deb/deb-installation-test.sh

    - name: дёҠдј debеҢ…еҲ°artifacts
      uses: actions/upload-artifact@v7
      with:
        name: chsrc-deb-files
        path: dist/chsrc_*.deb
        retention-days: 30

    - name: дёҠдј йҷ„д»¶еҲ°GitHub Releases(the newly created release)
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        # з”Ё * зңҒз•ҘзүҲжң¬еҸ·пјҢд»ҘеҸҠжҢҮд»Јеҗ„з§Қжһ¶жһ„
        files: dist/chsrc_*.deb

    - name: дёҠдј йҷ„д»¶еҲ°GitHub Releases(the 'pre' release)
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: pre
        # з”Ё * жҢҮд»Јеҗ„з§Қжһ¶жһ„
        files: dist-for-pre/chsrc_latest-1_*.deb





  Create-APT-repository:
    name: еҲӣе»әAPTд»“еә“
    needs: Build-deb
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v7
      with:
        pattern: chsrc-deb-files
        merge-multiple: true
        path: ./debs

    - name: Install repository tools
      run: |
        sudo apt-get update
        sudo apt-get install -y dpkg-dev

    - name: Create Packages file
      run: |
        cd debs
        dpkg-scanpackages . /dev/null | gzip -9c > Packages.gz
        dpkg-scanpackages . /dev/null > Packages

    - name: Upload repository metadata
      uses: actions/upload-artifact@v7
      with:
        name: debian-repository-metadata
        path: debs/Packages*
        retention-days: 30
